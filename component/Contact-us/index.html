<!-- Contact Section -->

<section class="py-5 bg-body-tertiary">

    <div class="container">

        <!-- Section Heading -->

        <div class="row justify-content-center mb-5">

            <div class="col-lg-7 text-center">

                <span class="badge bg-primary px-3 py-2 mb-3">
                    Contact Me
                </span>

                <h2 class="display-5 fw-bold">
                    Let's Work Together
                </h2>

                <p class="text-secondary">
                    Feel free to contact me for your next project or any questions.
                    I'm always happy to discuss new opportunities.
                </p>

            </div>

        </div>

        <!-- Contact Info -->

        <div class="row g-4 mb-5">

            <div class="col-lg-4 col-md-6">

                <div class="card border-0 shadow-lg rounded-4 h-100">

                    <div class="card-body text-center p-4">

                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-4"
                            style="width:80px;height:80px;">

                            <i class="bi bi-geo-alt-fill fs-1 text-primary"></i>

                        </div>

                        <h4 class="fw-bold">
                            Address
                        </h4>

                        <p class="text-secondary mb-0">
                            Dhaka, Bangladesh
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-lg-4 col-md-6">

                <div class="card border-0 shadow-lg rounded-4 h-100">

                    <div class="card-body text-center p-4">

                        <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-4"
                            style="width:80px;height:80px;">

                            <i class="bi bi-envelope-fill fs-1 text-success"></i>

                        </div>

                        <h4 class="fw-bold">
                            Email
                        </h4>

                        <p class="text-secondary mb-0">
                            yourmail@example.com
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-lg-4 col-md-6 mx-md-auto">

                <div class="card border-0 shadow-lg rounded-4 h-100">

                    <div class="card-body text-center p-4">

                        <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-4"
                            style="width:80px;height:80px;">

                            <i class="bi bi-telephone-fill fs-1 text-danger"></i>

                        </div>

                        <h4 class="fw-bold">
                            Phone
                        </h4>

                        <p class="text-secondary mb-0">
                            +8801XXXXXXXXX
                        </p>

                    </div>

                </div>

            </div>

        </div>

        <!-- Contact Form + Map -->

        <div class="row g-4">

            <div class="col-lg-6">

                <div class="card border-0 shadow-lg rounded-4">

                    <div class="card-body p-4">

                        <h3 class="fw-bold mb-4">
                            Send Message
                        </h3>

                        <form>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <input type="text"
                                        class="form-control form-control-lg"
                                        placeholder="Full Name">

                                </div>

                                <div class="col-md-6 mb-3">

                                    <input type="email"
                                        class="form-control form-control-lg"
                                        placeholder="Email Address">

                                </div>

                            </div>

                            <div class="mb-3">

                                <input type="text"
                                    class="form-control form-control-lg"
                                    placeholder="Subject">

                            </div>

                            <div class="mb-4">

                                <textarea class="form-control"
                                    rows="6"
                                    placeholder="Your Message"></textarea>

                            </div>

                            <button class="btn btn-primary btn-lg w-100 rounded-pill">
                                <i class="bi bi-send-fill me-2"></i>
                                Send Message
                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <!-- Google Map -->

            <div class="col-lg-6">

                <div class="card border-0 shadow-lg rounded-4 h-100">

                    <div class="card-body p-3">

                        <h3 class="fw-bold text-center mb-3">
                            My Location
                        </h3>

                        <div class="ratio ratio-4x3 rounded overflow-hidden">

                            <iframe
                                src="https://www.google.com/maps?q=Dhaka,Bangladesh&output=embed"
                                loading="lazy"
                                allowfullscreen>
                            </iframe>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- Social Media -->

        <div class="row justify-content-center mt-5">

            <div class="col-lg-8">

                <div class="card border-0 shadow-lg rounded-4">

                    <div class="card-body text-center p-5">

                        <h3 class="fw-bold mb-4">
                            Follow Me
                        </h3>

                        <div class="d-flex justify-content-center flex-wrap gap-3">

                            <a href="#" class="btn btn-outline-primary btn-lg rounded-pill">
                                <i class="bi bi-facebook me-2"></i>Facebook
                            </a>

                            <a href="#" class="btn btn-outline-dark btn-lg rounded-pill">
                                <i class="bi bi-twitter-x me-2"></i>X
                            </a>

                            <a href="#" class="btn btn-outline-info btn-lg rounded-pill">
                                <i class="bi bi-linkedin me-2"></i>LinkedIn
                            </a>

                            <a href="#" class="btn btn-outline-secondary btn-lg rounded-pill">
                                <i class="bi bi-github me-2"></i>GitHub
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
